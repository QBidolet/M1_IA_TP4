<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Critiques de Films</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease;
            background: white;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.show {
            display: block;
        }

        .result.positive {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .result.negative {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .result.neutral {
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            color: #856404;
        }

        .result-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
        }

        .result-text {
            text-align: center;
            line-height: 1.6;
        }

        .model-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            margin-top: 20px;
            padding: 15px;
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            border-radius: 10px;
            color: #721c24;
            display: none;
        }

        .error.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        .api-info {
            margin-top: 30px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 10px;
            font-size: 13px;
            color: #004085;
        }

        .api-info strong {
            display: block;
            margin-bottom: 5px;
        }

        .api-info code {
            background: #cce5ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .model-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Analyseur de Critiques</h1>
        <p class="subtitle">Découvrez si votre critique de film est positive ou négative</p>

        <form id="reviewForm">
            <div class="input-group">
                <label for="reviewText">Votre critique :</label>
                <textarea name="avis" id="reviewText" placeholder="Écrivez votre critique ici..." required></textarea>

                <br/>
                <br/>

                <label for="modelSelect">Modèl :</label>
                <select name="model" id="modelSelect" required>
                    <option value="mlp">MLP</option>
                    <option value="rl">Regression Logistique</option>
                </select>
            </div>

            <button type="submit" class="btn" id="submitBtn">Analyser la critique</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyse en cours...</p>
        </div>

        <div class="result" id="result">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-text" id="confianceText"></div>
            <div class="result-text" id="motImportantText"></div>
        </div>

        <div class="error" id="error">
            <strong>❌ Erreur</strong>
            <p id="errorMessage"></p>
        </div>
    </div>

    <script>
        const reviewForm = document.getElementById("reviewForm");

        // Gestion de la soumission du formulaire
        reviewForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(reviewForm)

            // Réinitialiser l'affichage
            hideError();
            hideResult();
            
            const response = await fetch("/predict/", {method: "POST", body: formData});
            const prediction = await response.json();
            
            displayResult(prediction);
            reviewForm.reset();
        });

        // Afficher le résultat
        function displayResult(prediction) {
            result.classList.remove('positive', 'negative');

            if (prediction.prediction === 'Positif') {
                result.classList.add('positive');
                resultIcon.textContent = '😊';
                resultTitle.textContent = 'Critique Positive !';
                resultText.textContent = `Votre critique est positive. Vous avez apprécié ce film !`;
            } else {
                result.classList.add('negative');
                resultIcon.textContent = '😞';
                resultTitle.textContent = 'Critique Négative';
                resultText.textContent = `Votre critique est négative. Ce film ne vous a pas convaincu.`;
            }

            confianceText.textContent = `Confiance : ${prediction.confiance}`;
            motImportantText.textContent = prediction.mots_importants.map(mot => mot[0]).join(", ");

            console.log(prediction);

            showResult();
        }

        // Fonctions d'affichage
        function showResult() {
            result.classList.add('show');
        }

        function hideResult() {
            result.classList.remove('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            error.classList.add('show');
        }

        function hideError() {
            error.classList.remove('show');
        }
    </script>
</body>
</html>
